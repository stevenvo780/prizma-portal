<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 384" width="680" height="384" role="img" aria-label="Prizma Iris" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ground_iris" x1="0" y1="0" x2="680" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1417"/>
      <stop offset="0.55" stop-color="#0A1622"/>
      <stop offset="1" stop-color="#116532"/>
    </linearGradient>
    <linearGradient id="beam_iris" x1="0" y1="0" x2="680" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1FB85C" stop-opacity="0"/>
      <stop offset="0.4" stop-color="#1FB85C"/>
      <stop offset="1" stop-color="#2DCBD1"/>
    </linearGradient>
    <radialGradient id="glow_iris" cx="0.18" cy="0.32" r="0.7">
      <stop offset="0" stop-color="#1FB85C" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#1FB85C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="680" height="384" fill="url(#ground_iris)"/>
  <rect width="680" height="384" fill="url(#glow_iris)"/>

  <!-- espectro refractado -->
  <g>
      <path d="M-40 150 L720 110 L720 150 L-40 190 Z" fill="url(#beam_iris)" opacity="0.66"/>
      <path d="M-40 187.5 L720 138.5 L720 178.5 L-40 227.5 Z" fill="url(#beam_iris)" opacity="0.54"/>
      <path d="M-40 225 L720 167 L720 207 L-40 265 Z" fill="url(#beam_iris)" opacity="0.41"/>
      <path d="M-40 262.5 L720 195.5 L720 235.5 L-40 302.5 Z" fill="url(#beam_iris)" opacity="0.29"/>
      <path d="M-40 300 L720 224 L720 264 L-40 340 Z" fill="url(#beam_iris)" opacity="0.16"/>
  </g>

  <!-- el prisma: triángulo translúcido que refracta el haz -->
  <g transform="translate(96 110)">
    <path d="M0 -58 L60 64 L-60 64 Z" fill="#ffffff" opacity="0.06"/>
    <path d="M0 -58 L60 64 L-60 64 Z" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2"/>
    <circle cx="-2" cy="-42" r="6" fill="#FF5A2B"/>
  </g>

  <!-- haz de entrada -->
  <path d="M-10 120 L120 150" stroke="#ffffff" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round"/>

  <!-- glifo de la deidad -->
  <g transform="translate(530 174)">
    <g stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M-46 -8 L34 -38 V40 L-46 12 Z"/><path d="M-46 -8 V12"/><path d="M-22 4 V44 H-4 V11"/></g>
        <g stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round"><path d="M44 -22 q14 14 0 32"/><path d="M54 -34 q26 24 0 56"/></g>
  </g>

  <!-- wordmark -->
  <text x="40" y="350" font-family="Sora, system-ui, sans-serif" font-size="34" font-weight="700" letter-spacing="-0.5" fill="#ffffff">Iris</text>
  <text x="42" y="370" font-family="Inter, system-ui, sans-serif" font-size="13" letter-spacing="2" fill="#1FB85C" opacity="0.95">PRIZMA</text>
</svg>
