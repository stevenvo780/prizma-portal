<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 384" width="680" height="384" role="img" aria-label="Prizma Logos" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ground_logos" x1="0" y1="0" x2="680" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1417"/>
      <stop offset="0.55" stop-color="#0A1622"/>
      <stop offset="1" stop-color="#1763BC"/>
    </linearGradient>
    <linearGradient id="beam_logos" x1="0" y1="0" x2="680" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2E90FA" stop-opacity="0"/>
      <stop offset="0.4" stop-color="#2E90FA"/>
      <stop offset="1" stop-color="#2DCBD1"/>
    </linearGradient>
    <radialGradient id="glow_logos" cx="0.18" cy="0.32" r="0.7">
      <stop offset="0" stop-color="#2E90FA" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#2E90FA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="680" height="384" fill="url(#ground_logos)"/>
  <rect width="680" height="384" fill="url(#glow_logos)"/>

  <!-- espectro refractado -->
  <g>
      <path d="M-40 150 L720 110 L720 150 L-40 190 Z" fill="url(#beam_logos)" opacity="0.66"/>
      <path d="M-40 187.5 L720 138.5 L720 178.5 L-40 227.5 Z" fill="url(#beam_logos)" opacity="0.54"/>
      <path d="M-40 225 L720 167 L720 207 L-40 265 Z" fill="url(#beam_logos)" opacity="0.41"/>
      <path d="M-40 262.5 L720 195.5 L720 235.5 L-40 302.5 Z" fill="url(#beam_logos)" opacity="0.29"/>
      <path d="M-40 300 L720 224 L720 264 L-40 340 Z" fill="url(#beam_logos)" opacity="0.16"/>
  </g>

  <!-- el prisma: triángulo translúcido que refracta el haz -->
  <g transform="translate(96 110)">
    <path d="M0 -58 L60 64 L-60 64 Z" fill="#ffffff" opacity="0.06"/>
    <path d="M0 -58 L60 64 L-60 64 Z" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2"/>
    <circle cx="-2" cy="-42" r="6" fill="#FF5A2B"/>
  </g>

  <!-- haz de entrada -->
  <path d="M-10 120 L120 150" stroke="#ffffff" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round"/>

  <!-- glifo de la deidad -->
  <g transform="translate(530 174)">
    <g stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M-30 -42 H22 L38 -26 V42 L30 36 L22 42 L14 36 L6 42 L-2 36 L-10 42 L-18 36 L-30 42 Z"/><path d="M-18 -22 H22"/><path d="M-18 -4 H22"/><path d="M-18 14 H6"/></g>
  </g>

  <!-- wordmark -->
  <text x="40" y="350" font-family="Sora, system-ui, sans-serif" font-size="34" font-weight="700" letter-spacing="-0.5" fill="#ffffff">Logos</text>
  <text x="42" y="370" font-family="Inter, system-ui, sans-serif" font-size="13" letter-spacing="2" fill="#2E90FA" opacity="0.95">PRIZMA</text>
</svg>
