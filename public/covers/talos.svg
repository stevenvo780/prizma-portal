<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 384" width="680" height="384" role="img" aria-label="Prizma Talos" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ground_talos" x1="0" y1="0" x2="680" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1417"/>
      <stop offset="0.55" stop-color="#0A1622"/>
      <stop offset="1" stop-color="#8C5C00"/>
    </linearGradient>
    <linearGradient id="beam_talos" x1="0" y1="0" x2="680" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F59E0B" stop-opacity="0"/>
      <stop offset="0.4" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#2DCBD1"/>
    </linearGradient>
    <radialGradient id="glow_talos" cx="0.18" cy="0.32" r="0.7">
      <stop offset="0" stop-color="#F59E0B" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="680" height="384" fill="url(#ground_talos)"/>
  <rect width="680" height="384" fill="url(#glow_talos)"/>

  <!-- espectro refractado -->
  <g>
      <path d="M-40 150 L720 110 L720 150 L-40 190 Z" fill="url(#beam_talos)" opacity="0.66"/>
      <path d="M-40 187.5 L720 138.5 L720 178.5 L-40 227.5 Z" fill="url(#beam_talos)" opacity="0.54"/>
      <path d="M-40 225 L720 167 L720 207 L-40 265 Z" fill="url(#beam_talos)" opacity="0.41"/>
      <path d="M-40 262.5 L720 195.5 L720 235.5 L-40 302.5 Z" fill="url(#beam_talos)" opacity="0.29"/>
      <path d="M-40 300 L720 224 L720 264 L-40 340 Z" fill="url(#beam_talos)" opacity="0.16"/>
  </g>

  <!-- el prisma: triángulo translúcido que refracta el haz -->
  <g transform="translate(96 110)">
    <path d="M0 -58 L60 64 L-60 64 Z" fill="#ffffff" opacity="0.06"/>
    <path d="M0 -58 L60 64 L-60 64 Z" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2"/>
    <circle cx="-2" cy="-42" r="6" fill="#FF5A2B"/>
  </g>

  <!-- haz de entrada -->
  <path d="M-10 120 L120 150" stroke="#ffffff" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round"/>

  <!-- glifo de la deidad -->
  <g transform="translate(530 174)">
    <g stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="-34" y="-26" width="68" height="56" rx="12"/><circle cx="-12" cy="-2" r="6" fill="#ffffff"/><circle cx="12" cy="-2" r="6" fill="#ffffff"/><path d="M-10 18 H10"/><path d="M0 -26 V-40"/><circle cx="0" cy="-44" r="5" fill="#ffffff"/></g>
  </g>

  <!-- wordmark -->
  <text x="40" y="350" font-family="Sora, system-ui, sans-serif" font-size="34" font-weight="700" letter-spacing="-0.5" fill="#ffffff">Talos</text>
  <text x="42" y="370" font-family="Inter, system-ui, sans-serif" font-size="13" letter-spacing="2" fill="#F59E0B" opacity="0.95">PRIZMA</text>
</svg>
